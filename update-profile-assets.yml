name: Update Profile Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "scripts/generate_profile_stats.py"
      - ".github/workflows/update-profile-assets.yml"

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stable GitHub analytics card
        run: python scripts/generate_profile_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: sarimdev786
          CONTRIBUTIONS_MILESTONE: "831"
          STREAK_MILESTONE: "8"

      - name: Generate contribution snake files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sarimdev786
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-analytics.svg
          git add assets/github-contribution-grid-snake.svg
          git add assets/github-contribution-grid-snake-dark.svg

          if git diff --cached --quiet; then
            echo "No profile asset changes to commit."
          else
            git commit -m "chore: refresh profile analytics and animations"
            git push
          fi
